<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moons of Kassis — A D&D 5e Sourcebook</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c;
    --gold-light: #d4b96e;
    --bg: #0d0b08;
    --bg-card: #15130f;
    --bg-card-open: #1a1714;
    --bg-header: #1a1510;
    --border: #3a3530;
    --border-dim: #2a2520;
    --border-inner: #1a1714;
    --text: #d4cfc7;
    --text-muted: #9a9080;
    --text-dim: #6b6050;
    --text-flavor: #b8a882;
    --accent-red: #6b4c2a;
    --font-serif: 'Crimson Text', Georgia, serif;
    --font-display: 'Cinzel', serif;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-serif);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 16px;
    line-height: 1.6;
  }

  /* ---- HEADER ---- */
  #site-header {
    background: linear-gradient(180deg, #1a1510 0%, #0d0b08 100%);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem 0;
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
  }
  .site-title {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    cursor: pointer;
    user-select: none;
    text-decoration: none;
  }
  .site-subtitle {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    margin-top: 2px;
  }
  .menu-toggle {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 0.7rem;
    color: var(--gold);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: var(--font-serif);
    display: none;
  }

  /* ---- NAV ---- */
  .nav-tabs {
    display: flex;
    gap: 0.15rem;
    overflow-x: auto;
    padding-bottom: 0;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0.35rem 0.7rem 0.55rem;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.72rem;
    white-space: nowrap;
    font-family: var(--font-display);
    letter-spacing: 0.05em;
    transition: color 0.15s, border-color 0.15s;
    outline: none;
  }
  .nav-tab:hover { color: var(--gold-light); }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ---- DROPDOWN NAV (mobile) ---- */
  .nav-dropdown {
    display: none;
    flex-direction: column;
    background: #12100d;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .nav-dropdown.open { display: flex; }
  .nav-dropdown-item {
    background: none;
    border: none;
    padding: 0.7rem 1rem;
    text-align: left;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.95rem;
    font-family: var(--font-serif);
    border-bottom: 1px solid var(--border-inner);
    transition: background 0.1s, color 0.1s;
  }
  .nav-dropdown-item:last-child { border-bottom: none; }
  .nav-dropdown-item:hover { background: var(--bg-card); color: var(--gold-light); }
  .nav-dropdown-item.active { background: var(--bg-card-open); color: var(--gold); }

  /* ---- MAIN CONTENT ---- */
  main {
    flex: 1;
    padding: 2rem 1.5rem;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .page { display: none; }
  .page.active { display: block; animation: fadein 0.25s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .page-title {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--gold);
    border-bottom: 2px solid var(--border);
    padding-bottom: 0.8rem;
    margin-bottom: 1.5rem;
    letter-spacing: 0.04em;
  }

  /* ---- TYPOGRAPHY ---- */
  .section-header {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--gold);
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
  }
  .sub-header {
    font-family: var(--font-display);
    font-size: 1.15rem;
    color: var(--gold-light);
    margin-top: 1.8rem;
    margin-bottom: 0.6rem;
  }
  p { line-height: 1.78; margin-bottom: 1rem; color: var(--text); }
  .flavor-text {
    border-left: 3px solid var(--gold);
    padding-left: 1rem;
    margin: 1.5rem 0;
    font-style: italic;
    color: var(--text-flavor);
    line-height: 1.75;
  }

  /* ---- TABLES ---- */
  .table-wrap { overflow-x: auto; margin: 0.8rem 0 1.5rem; }
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 0.5rem 0.8rem;
    border-bottom: 2px solid var(--gold);
    color: var(--gold);
    font-family: var(--font-display);
    font-size: 0.82rem;
    text-align: left;
    white-space: nowrap;
  }
  td {
    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border-dim);
    color: var(--text);
    font-size: 0.9rem;
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }

  /* ---- ACCORDION CARDS ---- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 0.9rem 0;
    overflow: hidden;
    transition: background 0.15s;
  }
  .card.open { background: var(--bg-card-open); }
  .card-toggle {
    width: 100%;
    background: none;
    border: none;
    padding: 1rem 1.2rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
    gap: 1rem;
  }
  .card-toggle:focus-visible { outline: 1px solid var(--gold); }
  .card-name {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--gold);
    line-height: 1.3;
  }
  .card-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .card-chevron {
    color: var(--gold);
    font-size: 1rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .card.open .card-chevron { transform: rotate(180deg); }
  .card-body {
    display: none;
    padding: 0 1.2rem 1.2rem;
    font-size: 0.93rem;
    color: var(--text);
    line-height: 1.72;
  }
  .card.open .card-body { display: block; }
  .card-lore { margin-bottom: 0.9rem; }
  .card-ability { font-size: 0.88rem; color: var(--text-flavor); margin-bottom: 0.8rem; }
  .card-ability strong { color: var(--gold); }
  .trait { margin-bottom: 0.45rem; font-size: 0.9rem; }
  .trait strong { color: var(--gold-light); }
  .card-meta { color: var(--text-muted); margin-bottom: 0.7rem; font-size: 0.88rem; }
  .card-meta strong { color: var(--gold); }
  .card-hook {
    border-left: 3px solid var(--accent-red);
    padding-left: 0.8rem;
    margin: 0.8rem 0;
    color: var(--text-flavor);
    font-size: 0.9rem;
  }
  .card-tone { color: var(--text-muted); font-size: 0.88rem; }
  .card-tone strong { color: var(--gold); }
  .card-feature-box {
    background: #12100d;
    border-radius: 6px;
    padding: 0.8rem;
    border: 1px solid var(--border-dim);
    margin-top: 0.6rem;
  }
  .card-feature-name {
    font-family: var(--font-display);
    color: var(--gold-light);
    margin-bottom: 0.4rem;
    font-size: 0.95rem;
  }
  .guild-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.3rem 1rem;
    margin-bottom: 0.8rem;
    font-size: 0.88rem;
  }
  .guild-grid strong { color: var(--gold); }
  .guild-equip { font-size: 0.88rem; margin-bottom: 0.8rem; }
  .guild-equip strong { color: var(--gold); }

  /* ---- STAT BLOCK ---- */
  .stat-block {
    background: var(--bg-card-open);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    margin: 1.5rem 0;
  }
  .stat-name {
    font-family: var(--font-display);
    font-size: 1.25rem;
    color: var(--gold);
    margin-bottom: 0.2rem;
  }
  .stat-type {
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.84rem;
    margin-bottom: 0.8rem;
  }
  .stat-row {
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    padding: 0.4rem 0;
    margin: 0.5rem 0;
    font-size: 0.9rem;
  }
  .stat-row strong { color: var(--gold); }
  .stat-abilities {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    text-align: center;
    margin: 0.6rem 0;
    font-size: 0.8rem;
  }
  .stat-ability-label { color: var(--gold); font-weight: 700; font-size: 0.75rem; }
  .stat-ability-val { color: var(--text); }
  .stat-section-label {
    color: var(--gold);
    font-family: var(--font-display);
    font-size: 0.95rem;
    margin-top: 0.8rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.25rem;
    margin-bottom: 0.4rem;
  }
  .stat-entry { margin-bottom: 0.5rem; font-size: 0.9rem; }
  .stat-entry strong { color: var(--gold-light); }

  /* ---- GLOSSARY ---- */
  .gloss-row {
    display: flex;
    gap: 0.8rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border-inner);
    font-size: 0.93rem;
    align-items: baseline;
  }
  .gloss-row:last-child { border-bottom: none; }
  .gloss-term {
    color: var(--gold);
    font-weight: 600;
    min-width: 170px;
    flex-shrink: 0;
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.03em;
  }

  /* ---- PAGE NAV ---- */
  .page-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-dim);
  }
  .page-nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.5rem 1rem;
    color: var(--gold);
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    transition: border-color 0.15s, background 0.15s;
  }
  .page-nav-btn:hover { background: var(--bg-card); border-color: var(--gold); }

  /* ---- FOOTER ---- */
  footer {
    text-align: center;
    padding: 1.5rem;
    border-top: 1px solid var(--border-inner);
    color: #4a4540;
    font-size: 0.75rem;
    font-family: var(--font-display);
    letter-spacing: 0.1em;
  }

  /* ---- STAR FIELD HERO ---- */
  .hero-banner {
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, #1a1008 0%, #0d0b08 70%);
    border-bottom: 1px solid var(--border);
    padding: 3rem 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .hero-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,220,150,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 8%, rgba(255,220,150,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 35%, rgba(255,220,150,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 12%, rgba(200,180,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 28%, rgba(255,220,150,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 70%, rgba(255,220,150,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 8% 55%, rgba(255,220,150,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 75%, rgba(200,180,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 88%, rgba(255,220,150,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 65%, rgba(255,220,150,0.5) 0%, transparent 100%);
    pointer-events: none;
  }
  .hero-moons {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .moon-orb {
    border-radius: 50%;
    opacity: 0.85;
    flex-shrink: 0;
  }
  .moon-orb.large {
    width: 56px; height: 56px;
    background: radial-gradient(circle at 35% 35%, #e8e0d0, #a09060 50%, #3a3020);
    box-shadow: 0 0 20px rgba(201,168,76,0.3);
  }
  .moon-orb.medium {
    width: 36px; height: 36px;
    background: radial-gradient(circle at 40% 35%, #c8d8e0, #6080a0 50%, #1a2840);
    box-shadow: 0 0 12px rgba(100,140,200,0.25);
    align-self: center;
  }
  .moon-orb.small {
    width: 22px; height: 22px;
    background: radial-gradient(circle at 38% 32%, #d8c8b0, #806040 50%, #2a1810);
    align-self: flex-end;
    margin-bottom: 8px;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--gold);
    letter-spacing: 0.12em;
    margin-bottom: 0.4rem;
    text-shadow: 0 2px 20px rgba(201,168,76,0.4);
  }
  .hero-tagline {
    font-style: italic;
    color: var(--text-flavor);
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }
  .hero-sub {
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    font-family: var(--font-display);
  }
  .sphere-glow {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.08) 0%, transparent 70%);
    border: 1px solid rgba(201,168,76,0.15);
    margin: 1.5rem auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: rgba(201,168,76,0.4);
    font-family: var(--font-display);
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 1.4;
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 600px) {
    .menu-toggle { display: block; }
    .nav-tabs { display: none; }
    main { padding: 1.2rem 1rem; }
    .page-title { font-size: 1.5rem; }
    .guild-grid { grid-template-columns: 1fr; }
    .stat-abilities { font-size: 0.72rem; }
    .gloss-term { min-width: 120px; font-size: 0.75rem; }
    .hero-banner { padding: 2rem 1rem; }
  }
</style>
</head>
<body>

<header id="site-header">
  <div class="header-top">
    <div>
      <div class="site-title" onclick="navigate('welcome')" tabindex="0" role="button">MOONS OF KASSIS</div>
      <div class="site-subtitle">A D&D 5E SOURCEBOOK · HOLY KEPHRYNN UNION</div>
    </div>
    <button class="menu-toggle" onclick="toggleMenu()" id="menu-toggle">☰ Chapters</button>
  </div>
  <div class="nav-dropdown" id="nav-dropdown"></div>
  <nav class="nav-tabs" id="nav-tabs" aria-label="Chapters"></nav>
</header>

<main id="main-content" role="main"></main>

<footer>Holy Kephrynn Union &nbsp;·&nbsp; Path of Fragments &nbsp;·&nbsp; UY 14,815
<br><span style="opacity:.5;font-size:.65rem">Based on D&D 5e SRD (CC BY 4.0) · Original World: Moons of Kassis</span>
</footer>

<script>
// ============================================================
// DATA
// ============================================================
const CHAPTERS = [
  { id: "welcome",    title: "Welcome to the Moons",    short: "Welcome"    },
  { id: "ancestries", title: "Ancestries of Kassis",    short: "Ancestries" },
  { id: "guilds",     title: "Guilds & Backgrounds",    short: "Guilds"     },
  { id: "mechanics",  title: "New Mechanics",            short: "Mechanics"  },
  { id: "moons",      title: "The Moons",                short: "Moons"      },
  { id: "factions",   title: "Factions & Houses",        short: "Factions"   },
  { id: "monsters",   title: "Monsters & Adversaries",   short: "Monsters"   },
  { id: "religion",   title: "Religion & Philosophy",    short: "Religion"   },
  { id: "appendix",   title: "Glossary & Reference",     short: "Appendix"   },
];

// ============================================================
// UTILITY HTML BUILDERS
// ============================================================
function sectionHeader(text) {
  return `<h2 class="section-header">${text}</h2>`;
}
function subHeader(text) {
  return `<h3 class="sub-header">${text}</h3>`;
}
function para(text) {
  return `<p>${text}</p>`;
}
function flavor(text) {
  return `<div class="flavor-text">${text}</div>`;
}
function table(headers, rows) {
  const ths = headers.map(h => `<th>${h}</th>`).join('');
  const trs = rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
  return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
}
let cardCounter = 0;
function accordionCard(name, subtitle, bodyHtml) {
  const id = 'card-' + (++cardCounter);
  return `
  <div class="card" id="${id}">
    <button class="card-toggle" onclick="toggleCard('${id}')" aria-expanded="false">
      <div>
        <div class="card-name">${name}</div>
        ${subtitle ? `<div class="card-sub">${subtitle}</div>` : ''}
      </div>
      <span class="card-chevron">▼</span>
    </button>
    <div class="card-body">${bodyHtml}</div>
  </div>`;
}
function ancestryCard(name, subtitle, lore, ability, traits) {
  const traitHtml = traits.map(t => `<div class="trait"><strong>${t.name}.</strong> ${t.desc}</div>`).join('');
  const body = `
    <p class="card-lore">${lore}</p>
    ${ability ? `<div class="card-ability"><strong>Ability Scores:</strong> ${ability}</div>` : ''}
    ${traitHtml}`;
  return accordionCard(name, subtitle, body);
}
function moonCard({name, subtitle, house, pop, desc, hook, location, tone}) {
  const body = `
    <div class="card-meta"><strong>Ruling House:</strong> ${house}${pop ? ` &nbsp;|&nbsp; <strong>Population:</strong> ${pop}` : ''}</div>
    <p>${desc}</p>
    ${hook ? `<div class="card-hook"><strong>Adventure Hook:</strong> ${hook}</div>` : ''}
    ${location ? `<p><strong style="color:var(--gold-light)">Key Location:</strong> ${location}</p>` : ''}
    ${tone ? `<div class="card-tone"><strong>Tone:</strong> ${tone}</div>` : ''}`;
  return accordionCard(name, subtitle, body);
}
function guildCard({name, subtitle, desc, skills, tools, langs, equip, feature, featureDesc}) {
  const body = `
    <p>${desc}</p>
    <div class="guild-grid">
      <div><strong>Skills:</strong> ${skills}</div>
      <div><strong>Tools:</strong> ${tools}</div>
      <div><strong>Languages:</strong> ${langs}</div>
    </div>
    <div class="guild-equip"><strong>Equipment:</strong> ${equip}</div>
    <div class="card-feature-box">
      <div class="card-feature-name">${feature}</div>
      <div style="font-size:.88rem">${featureDesc}</div>
    </div>`;
  return accordionCard(name, subtitle, body);
}
function statBlock({name, type, ac, hp, speed, str, dex, con, int_, wis, cha, traits, actions, bonus}) {
  const abilities = [['STR',str],['DEX',dex],['CON',con],['INT',int_],['WIS',wis],['CHA',cha]];
  const abilGrid = `<div class="stat-abilities">${abilities.map(([l,v]) => `<div><div class="stat-ability-label">${l}</div><div class="stat-ability-val">${v}</div></div>`).join('')}</div>`;
  const traitsHtml = traits ? traits.map(t => `<div class="stat-entry"><strong>${t.name}.</strong> ${t.desc}</div>`).join('') : '';
  const actionsHtml = actions ? `<div class="stat-section-label">Actions</div>${actions.map(a => `<div class="stat-entry"><strong>${a.name}.</strong> ${a.desc}</div>`).join('')}` : '';
  const bonusHtml = bonus ? `<div class="stat-section-label">Bonus Actions</div>${bonus.map(a => `<div class="stat-entry"><strong>${a.name}.</strong> ${a.desc}</div>`).join('')}` : '';
  return `
  <div class="stat-block">
    <div class="stat-name">${name}</div>
    <div class="stat-type">${type}</div>
    <div class="stat-row"><strong>AC</strong> ${ac} &nbsp; <strong>HP</strong> ${hp} &nbsp; <strong>Speed</strong> ${speed}</div>
    ${abilGrid}
    ${traitsHtml}${actionsHtml}${bonusHtml}
  </div>`;
}

// ============================================================
// PAGE CONTENT GENERATORS
// ============================================================
function pageWelcome() {
  return `
  <div class="hero-banner">
    <div class="hero-moons">
      <div class="moon-orb small"></div>
      <div class="moon-orb large"></div>
      <div class="moon-orb medium"></div>
      <div class="moon-orb small" style="align-self:flex-start;margin-top:10px"></div>
    </div>
    <div class="hero-title">MOONS OF KASSIS</div>
    <div class="hero-tagline">Arcanepunk Space Opera meets Theocratic Feudalism</div>
    <div class="hero-sub">A SOURCEBOOK FOR D&D 5TH EDITION</div>
    <div class="sphere-glow">THE<br>SPHERE</div>
  </div>

  ${flavor('"At the dawn of the First Age of Kassis, the world was dominated by strange gargantuan creatures of unimaginable power. We, the Infinite Fragment Vessels, came later — and now, we look back from the moons at the shimmering Sphere that seals our home forever." <br>— <em>Ghianni Ghordosi, Holy Steward</em>')}

  ${sectionHeader('Two Thousand Years Ago, the World Died')}
  ${para('The war between the Krygaxian Kingdom and the Xix Magocracy had ravaged the eastern hemisphere for four millennia, but it was the final act of the Dragon Queen Caphaldi — the unleashing of a necromantic plague — that ended the world. The plague corrupted dragons, raised the ancient Kaigari giants from their long slumber, and turned the dead into an unstoppable tide. There was no defeating it. There was only escape.')}
  ${para('The Holy Kephrynn Union evacuated its people — and as many non-Faithful as it could reach — aboard the great Moonships of the Aetherspace fleet. The 12th Incarnation of the First Prophet, Nikalysa the Savior, and the Great Silver Wyrm Shom sacrificed themselves to anchor the Sphere: a colossal magical barrier that seals Kassis forever, trapping the plague, the undead, and everything that remained.')}
  ${para('Now, sixteen moons orbit the shimmering Sphere that was once a world. Sixteen Holy Houses govern them. Five Guilds structure every citizen\'s life. And the faith that carried the refugees across the void — the Khol Sadar, the Path of Fragments — persists, but frays at the edges. The Prophet has not returned for nearly two thousand years. The Holy Steward Grizzitgorn, an ancient Xixus who transformed himself into a Faithforged construct to serve indefinitely, governs in the Prophet\'s absence. And the silence of the Forgotten grows louder with every year.')}

  ${sectionHeader('The Setting in One Sentence')}
  ${para('<em>Moons of Kassis is arcanepunk space opera meets theocratic feudalism, set in the 2,000-year aftermath of an apocalypse that refugees survived by running — and is only now beginning to reckon with.</em>')}

  ${sectionHeader('The Tone')}
  ${para('This is not a high fantasy setting of Chosen Heroes and Dark Lords. It is a setting of institutions: large, old, and compromised institutions populated by people trying to do right within them, people trying to survive them, and people trying to burn them down. The faith is real. The magic works. But the Union is also a theocracy that built its empire on crusade and absorption, that outlawed an entire sisterhood of believers, that runs apprenticeship programs where wealthy families buy the best positions for their children.')}
  ${para('Adventures in the Moons of Kassis involve politics, faith, exploration, and the specific kind of violence that happens when 2,000-year-old institutions meet people who no longer have any reason to fear them.')}

  ${sectionHeader('Adapting Existing Classes')}
  ${table(

      ['Paladin','Maetyrn/Daeho','Order of the Spalted Scimitar, Faith Warriors'],
      ['Ranger','Maetyrn','Phelindor Monster-Hunters, New Mintox Wilderness Lords'],
      ['Druid','Daeho','Rhaeowhynn Grove-Keepers, Fung Mycelial Speakers'],
      ['Warlock','Any (Secret)','Void-Touched, Dhormalae Forbidden Arts, Voidist Radicals'],
      ['Sorcerer','Any','Zhendhori Elemental-Born, Starcaller Blessed, Xix Bloodline'],
      ['Monk','Daeho/Maetyrn','Orthos Path-Warriors, Sadari Contemplatives'],
      ['Barbarian','Maetyrn','Mintox Warband Veterans, Dhurin Kaigari-Touched'],
    ]
  )}`;

        { name: 'Cat\'s Claws', desc: 'Your claws are natural weapons. You can make unarmed strikes with them that deal 1d4 slashing damage + your STR or DEX modifier. You have a climbing speed of 20 feet.' },
        { name: 'Feline Senses', desc: 'You have darkvision to 60 feet and proficiency in the Perception skill.' },
        { name: 'Preternatural Reflexes', desc: 'When you take the Dodge action, you can move up to half your speed as part of the same action (this movement doesn\'t provoke opportunity attacks).' },
        { name: 'Sure Landing', desc: 'You always land on your feet. You take no falling damage from falls of 20 feet or less and only half damage from falls greater than 20 feet.' },
      ]
    },
    { name: 'Mintox', subtitle: 'Beast-folk (Bovine/Goat)',
      lore: 'The Mintox are anthropomorphic bovines and goats — a broad category encompassing significant physical variation, from the heavy-horned, barrel-chested cattle-folk of the northern Krygraxian steppes to the nimbler, cloven-hooved goat-folk who navigated the rocky eastern territories — but all of them carry the same central physical fact: they were built for impact. Dense musculature, lowered center of gravity, horns ranging from subtle ridges to spectacular multi-pointed racks, and hooves that strike the ground with a resonant authority that more delicate ancestries learn to listen for. The Krygraxian Kingdom was founded by the Mintox Krygrax, child of the red dragon Caphaldi, and the Mintox warbands he united were a formidable military force that matched the Kephrynn crusade era for era of brutal expansion. That kingdom\'s name is now complicated history: associated with genuine cultural achievement and also with brutal conquest, slave-taking, and ultimately the indirect unleashing of Caphaldi\'s undead plague. The Mintox in the Union today carry this history differently depending on family, region, and generation — some with shame, some with defiant pride, some with the weary pragmatism of people who know they cannot undo what their great-grandparents\' kingdom did and prefer to build something worth defending instead. On New Mintox, House Kelvath rules a desert moon that the Mintox have made their cultural reclamation project.',
      ability: 'Suggested +2 STR, +1 CON',
      traits: [
        { name: 'Gore', desc: 'Your horns are a natural weapon dealing 1d6 piercing + STR modifier. If you move at least 20 feet toward a target before hitting, the target must succeed on a STR saving throw (DC 8 + STR modifier + proficiency bonus) or be knocked prone.' },
        { name: 'Powerful Build', desc: 'You count as one size larger for carrying capacity and for push/drag/lift.' },
        { name: 'Hooved Charge', desc: 'Your hooves are also natural weapons that deal 1d4 bludgeoning + STR modifier.' },
        { name: 'Krygraxian Constitution', desc: 'You have advantage on saving throws against disease and exhaustion. Your hit point maximum increases by 1 per level.' },
      ]
    },
    { name: 'Rhaeowhynn', subtitle: 'Faerie-folk',
      lore: 'The Rexus Casim Forest was, before the Final War, one of the most magically saturated environments on Kassis — a Xix-adjacent ancient woodland where the boundary between the Sildae and the physical world was thin enough that the forest itself dreamed. The Rhaeowhynn who emerged from this environment are gossamer-winged, luminous-featured faerie-folk who carry the forest\'s magic in their blood so thoroughly that spellwork comes to them less as learned skill and more as memory. Small in stature — rarely exceeding four feet — they are easily underestimated by those who mistake size for significance. Their wings are iridescent, shifting through color spectra that vary between individuals and change with emotional state, which makes Rhaeowhynn uniquely terrible at concealing enthusiasm. Their bodies are delicate in appearance but surprisingly resilient; the same biological magic that makes them shimmer also makes them difficult to permanently harm, minor wounds knitting faster than they have any right to. The loss of the Forest in the Final War\'s devastation was a particular grief — not just ecological but spiritual, as many Rhaeowhynn felt the forest\'s dreaming go quiet in the Sildae during the plague years. Those who made it to the moons carry seedlings of the old forest in stasis, and on certain moons, tiny groves of transplanted Rexus Casim trees now grow in sealed gardens, tended with a reverence that has become its own form of prayer.',
      ability: 'Suggested +2 WIS or CHA, +1 DEX',
      traits: [
        { name: 'Faerie Flight', desc: 'You have a flying speed of 30 feet. You can\'t use this flying speed if you\'re wearing medium or heavy armor or carrying a heavy load.' },
        { name: 'Forest Magic', desc: 'You know the druidcraft and minor illusion cantrips. At 3rd level, you can cast the faerie fire spell once per long rest. At 5th level, you can cast the lesser restoration spell once per long rest. Wisdom is your spellcasting ability for these.' },
        { name: 'Fey Ancestry', desc: 'You have advantage on saving throws against being charmed. Magic can\'t put you to sleep.' },
        { name: 'Wing Chromatics', desc: 'Your wings shift color with emotion. Creatures who can see you have advantage on Insight checks against you, but you have proficiency in the Performance skill, and on a successful Performance check, you can intentionally display a misleading emotional state.' },
        { name: 'Size', desc: 'Small.' },
      ]
    },
    { name: 'Dholmer', subtitle: 'Pug-folk',
      lore: 'Moon Farstride is a port moon — the fastest ships in the Union dock there, the most ambitious smugglers route through there, and House Tsunari\'s shadow-governors have made it the beating commercial heart of the Union\'s Moonfleet trade. In this environment, the native Dholmer evolved through the particular crucible of being the most underestimated sapient species in a system that rewards exactly that quality. Stocky, wrinkled, with the broad flat faces and expressive eyes of their canine ancestors, the Dholmer read as soft, as harmless, as the kind of creature you pat on the head rather than negotiate with cautiously. This misperception has made them extraordinary. Their social intelligence is genuinely exceptional — they read emotional subtext in a room the way a navigator reads currents, and they leverage their apparent harmlessness as a tool with the precision of a master craftworker. In the Farstride docklands, a Dholmer fixer is considered more valuable than three swords and a spell, because a Dholmer fixer can prevent the situation that requires all three. They are intensely loyal to their chosen communities — a trait their canine heritage and Farstride\'s tight ship-crew culture reinforced across generations — and their support, once committed, is unconditional in the way that only loyalty built through genuine choice can be.',
      ability: 'Suggested +2 CHA, +1 WIS',
      traits: [
        { name: 'Social Cartography', desc: 'You have proficiency in the Insight and Deception skills. Once per short rest, you can make an Insight check against a creature\'s Deception check to detect a lie; on a success, you also learn the creature\'s current emotional state.' },
        { name: 'Harmless Bearing', desc: 'Creatures that haven\'t seen you fight have disadvantage on attack rolls against you until you deal damage or cast a spell.' },
        { name: 'Pack Loyalty', desc: 'While you and at least one willing ally who you consider a companion are within 10 feet of each other, you both have advantage on saving throws against the frightened condition.' },
        { name: 'Port Connections', desc: 'You have proficiency in the Persuasion skill and with navigator\'s tools. You always know the fastest legal (and the fastest illegal) route between two points in any city you\'ve spent at least a week in.' },
      ]
    },
    { name: 'Fung', subtitle: 'Mushroom-folk',
      lore: 'The Mithnami is called the Farmers Moon, but that name undersells the ecological depth of a world where magic has been woven into agricultural practice for two thousand years under House Mi\'Dratha\'s enchanter-stewardship. The moon\'s surface is covered in spell-gardens, floating sanctuaries, ritual shrines embedded in field walls, and the extensive mycelial networks that the Fung have cultivated and expanded since their emergence as the native people in Mithnami\'s early post-Exodus decades. The Fung are sentient fungal colonies — the biomass that constitutes their body is fungal in origin, organized into humanoid configurations that range from clearly botanical to nearly indistinguishable from other ancestries at a glance, depending on individual. Their heights range from two feet to seven feet. Their colors span earth tones, vivid reds, electric yellows, deep indigos. Their caps — when present — vary from small button-like structures to dramatic broad-brimmed formations that have inspired Mithnami architectural arches. They communicate verbally but also through the mycelial network that laces through Mithnami\'s soil, exchanging chemical information and emotional impressions at distances that allow for a kind of distributed consensus-building that other ancestries find either deeply impressive or faintly unsettling. When they defend themselves, the spores they release are not accidental.',
      ability: 'Suggested +2 CON, +1 WIS or INT',
      traits: [
        { name: 'Mycelial Network', desc: 'You can communicate simple emotional impressions and images (no language, no complexity beyond "fear," "food," "danger," "north") with other Fung within 300 feet of you, through the mycelial network in soil or wood.' },
        { name: 'Spore Defense', desc: 'As a reaction to being hit by a melee attack, you can release defensive spores. The attacker must succeed on a CON saving throw (DC 8 + CON modifier + proficiency bonus) or be poisoned until the end of its next turn. Once used, recharges on a short rest.' },
        { name: 'Fungal Fortitude', desc: 'You have resistance to poison damage and advantage on saving throws against the poisoned condition. You don\'t need sunlight — you can subsist on organic matter.' },
        { name: 'Deep Growth', desc: 'You have a burrow speed of 10 feet through soft earth. While in contact with soil, you have advantage on Survival checks to find food, water, or navigate by the mycelial "current."' },
      ]
    },
    { name: 'Dhurin', subtitle: 'Giantkin-folk',
      lore: 'The Tyrindor empire was never just dwarves. Giants walked the Kawafarr too — the Dhurin, who the dwarf historians classify as cousins and the Dhurin historians classify as the people who were already there. They are massive: seven to nine feet is average, with proportionate build, and individuals of exceptional size have reached eleven feet in the historical record. They are, in the living memory of the Union, the closest biological connection to the Kaigari — those gargantuan first-age beings who shaped Kassis\'s continents before falling into their long slumber. Whether this connection is genetic, cosmological, or simply a function of size is a question Dhurin scholars debate with the slow thoroughness their long lives permit. Under the Tyrindor Empire, the Dhurin served variously as laborers, soldiers, engineers, and in some cases rulers of regional territories — their relationship with the dwarves complex and never entirely equal, but deep enough to produce shared cultural traditions, language borrowings, and intermarriage across generations. After the Exodus, the Dhurin population scattered across the moons in relatively small numbers: their mass requirements make dense urban living challenging, and many ended up in frontier moon settlements — Phelindor\'s wilderness, New Mintox\'s desert, the outer reaches of Farstride\'s ports. Their Kaigari echoes are not merely metaphor.',
      ability: 'Suggested +2 STR, +1 CON',
      traits: [
        { name: 'Kaigari Echo', desc: 'Once per long rest, you can enter a state of primal resonance as a bonus action. For 1 minute, your unarmed strikes deal 1d6 + STR modifier bludgeoning damage, and when you hit a creature with a melee attack, it must succeed on a STR saving throw (DC 8 + STR modifier + proficiency bonus) or be pushed 5 feet away from you.' },
        { name: 'Mountain Born', desc: 'You have resistance to cold damage. You are adapted to high altitude and extreme cold; you suffer no ill effects from elevation.' },
        { name: 'Powerful Build', desc: 'You count as one size larger for carrying capacity and push/drag/lift. Your size is Medium but you stand 7–9 feet tall.' },
        { name: 'Stone\'s Endurance', desc: 'Once per short rest, when you take damage, you can use your reaction to reduce that damage by 1d12 + CON modifier.' },
      ]
    },
    { name: 'Zhendhori', subtitle: 'Elemental-folk',
      lore: 'The Moon of Meeru — the Elemental Court, governed by the mystic star-seekers of House Yezhura — is a world of raw elemental power leaking through from the planes that adjoin aetherspace. When the first refugee settlers arrived on Meeru following the Exodus, they encountered an environment in which the boundary between the material and the elemental was permeable in ways that no one had previously catalogued. Some settlers, over generations of exposure, were changed. Their children were changed further. The Zhendhori are the result: living conduits of raw elemental chaos, their bodies marked permanently by the element that claimed their bloodline. Fire-touched Zhendhori have hair that actually combusts in moments of strong emotion, skin that radiates warmth at all times, eyes lit from within by orange-white light. Water-touched have translucent patches of skin through which fluid currents are visible, and can be difficult to look at directly near light sources. Earth-touched display mineral formations in their skin — quartz inclusions, iron-gray striations, patches of actual crystalline growth. Air-touched seem to exist in perpetual gentle motion, hair lifting in absent winds, voices carrying unusual resonance. None of them chose this. All of them have had to decide what to do with it. The Zhendhori relationship with the Khol Sadar is complex: their very existence suggests the Path of Fragments may be more literal than metaphorical, but the manner of their transformation was not exactly voluntary enlightenment.',
      ability: 'Suggested +2 CON, +1 based on element (Fire: STR, Water: DEX, Earth: CON, Air: DEX or CHA)',
      traits: [
        { name: 'Elemental Bloodline', desc: 'At character creation, choose your element: Fire, Water, Earth, or Air. Your appearance, abilities, and additional traits are determined by this choice.' },
        { name: 'Elemental Resistance', desc: 'You have resistance to the damage type of your element (Fire: fire; Water: cold; Earth: bludgeoning from non-magical weapons; Air: lightning).' },
        { name: 'Elemental Expression', desc: 'Fire: you know the fire bolt cantrip. Water: you have a swim speed of 30 ft. Earth: your natural AC is 13 + CON modifier when unarmored. Air: you have advantage on checks and saves to avoid being knocked prone, and light falls count as 0 damage.' },
        { name: 'Surge', desc: 'Once per long rest, you can cast the elemental-aligned 1st-level spell without a slot: Fire: burning hands; Water: create or destroy water; Earth: earth tremor; Air: feather fall.' },
      ]
    },
    { name: 'Mho\'kai', subtitle: 'Simian-folk',
      lore: 'Moon Phelindor — the Forest Moon, where the Mho\'kai led House Brannoch holds sway over outlaw clans and monster-hunters — is a world of vast canopies, layered vertical ecosystems, and a surface rarely glimpsed through the unbroken green of its upper story. The native Mho\'kai mastered this environment so completely that they built a civilization in it without ever significantly disturbing the canopy itself: their settlements are architectural integrations of living tree and crafted structure, cities that grow rather than being imposed, communities that exist in relationship to the forest rather than in exploitation of it. Arboreal humanoids with long limbs proportionally greater than their body height, prehensile tails (present in nearly all Mho\'kai and used with the unconscious fluency of a fifth hand), and the large forward-facing eyes of predators built for three-dimensional navigation in dense foliage. Their fur ranges from tawny gold to deep charcoal, often with distinctive facial markings that vary by family line. On the ground, Mho\'kai move with the slightly awkward confidence of athletes in the wrong venue — perfectly capable but clearly designed for a different register. In the canopy, watching a Mho\'kai move is like watching physics become optional.',
      ability: 'Suggested +2 DEX, +1 STR or INT',
      traits: [
        { name: 'Canopy Movement', desc: 'You have a climbing speed of 35 feet. While climbing, you can make Acrobatics checks as a bonus action to change your grip and avoid falling.' },
        { name: 'Prehensile Tail', desc: 'Your tail functions as a third hand with the same dexterity as your primary hand. You can hold objects, wield a light weapon, or carry an item with it, but it cannot make attack rolls on its own.' },
        { name: 'Three-Dimensional Navigation', desc: 'You have proficiency in Acrobatics. While you\'re not on the ground, you have advantage on Acrobatics checks and Perception checks.' },
        { name: 'Canopy Sprint', desc: 'While climbing or moving through elevated terrain (scaffolding, rigging, tree branches), your speed is not reduced by difficult terrain and you do not provoke opportunity attacks from creatures that are not also in elevated terrain.' },
      ]
    },
  ];

  return `
  ${para('The Infinite Fragment Vessels — the sentient races of Kassis — are extraordinary in their variety. Over two thousand years of shared aetherspace habitation has produced new ancestries beyond those native to the homeworld.')}
  <p style="color:var(--text-muted);font-size:.88rem;margin-bottom:1rem">All ancestries use the Tasha\'s variant rule: increase one ability score by 2 and one by 1 (or three different scores by 1). Unless noted: Size Medium, Speed 30 ft., Languages: Common + one ancestral language. <strong style="color:var(--gold-light)">Tap any ancestry to expand.</strong></p>
  ${ancestries.map(a => ancestryCard(a.name, a.subtitle, a.lore, a.ability, a.traits)).join('')}`;
}

      skills: 'Athletics, Intimidation', tools: 'One gaming set, vehicles (land)', langs: 'One of your choice',

      skills: 'History, Arcana (or Nature or Religion, your choice)', tools: 'Calligrapher\'s supplies, one artisan\'s tool', langs: 'Two of your choice',

    },
    {
      name: 'Daeho', subtitle: 'Healer Cadre',

      skills: 'Medicine, Religion', tools: 'Herbalism kit; healer\'s kit (free, not consumed) — once per short rest, stabilize a creature at 0 HP without a roll', langs: 'One of your choice',

      feature: 'Sanctuary of the Forgotten',

    {
      name: 'Fizon', subtitle: 'Entertainer Cadre',

      feature: 'The Audience Knows Your Name',

    {
      name: 'Shamzi', subtitle: 'Tinkerer Cadre',

function pageMechanics() {
  return `
  ${sectionHeader('The Shard System (Path of Fragments)')}
  ${para('The Khol Sadar teaches that all sentient beings are Fragments of the Forgotten — and that spiritual progress along the Path of Fragments brings them closer to eventual reunion with that divine whole. The Shard System is a campaign-level mechanic that models this spiritual journey, rewarding players for acts of faith, sacrifice, discovery, and connection that align with the Path.')}
  ${flavor('The Shard System is intentionally lightweight. It adds narrative texture without complex bookkeeping. A character who never engages with the faith can ignore it almost entirely. A character who leans into it will find it profoundly rewarding. Both are valid.')}

  ${subHeader('Gaining Shards')}
  ${para('Shards are awarded by the GM at session end or at significant moments:')}
  <ul style="color:var(--text);line-height:2;padding-left:1.5rem;margin-bottom:1rem;font-size:.93rem">
    <li>Completing a significant act of selfless sacrifice on behalf of others <strong style="color:var(--gold)">(1 Shard)</strong></li>
    <li>Discovering a truth about the world or yourself that changes how you act <strong style="color:var(--gold)">(1 Shard)</strong></li>
    <li>Performing the Meditation of Fragments at a holy site or at dawn — a 10-minute ritual requiring no roll <strong style="color:var(--gold)">(1 Shard; once per long rest)</strong></li>
    <li>Preventing a death that would have occurred due to your inaction <strong style="color:var(--gold)">(1 Shard)</strong></li>
    <li>Receiving a vision from the Sildae Labyrinth in a dream <strong style="color:var(--gold)">(1–3 Shards, DM-awarded)</strong></li>
    <li>Completing a major story arc tied to personal beliefs or history <strong style="color:var(--gold)">(2–3 Shards)</strong></li>
  </ul>

  ${subHeader('Spending Shards')}
  ${table(
    ['Cost','Timing','Effect'],
    [
      ['1','Any time','+1d4 to any ability check, saving throw, or attack roll (after seeing the d20)'],
      ['1','Before a roll','Roll with advantage'],
      ['2','As a reaction','Avoid one instance of damage entirely (before damage is rolled)'],
      ['2','Once per long rest','Treat a spell slot expenditure as if it didn\'t happen (regain one slot 3rd level or lower)'],
      ['3','When reduced to 0 HP','Stand at 1 HP instead and gain effects of bless on yourself for 1 minute'],
      ['3','As an action','Cast guidance on up to six creatures simultaneously, lasting 1 hour'],
      ['5','End of session','Gain an additional use of your racial trait or class feature with limited uses'],
      ['10','Campaign milestone','Unlock a single Shard Epiphany (permanent boon)'],
    ]
  )}

  ${subHeader('Shard Epiphanies')}
  ${para('When a character spends 10 accumulated Shards and reaches a Shard Epiphany, choose one permanent boon (each selectable once):')}
  <ul style="color:var(--text);line-height:2;padding-left:1.5rem;margin-bottom:1rem;font-size:.93rem">
    <li><strong style="color:var(--gold-light)">Fragment Clarity:</strong> Proficiency in Insight and advantage on Intelligence (Religion) checks related to the Khol Sadar.</li>
    <li><strong style="color:var(--gold-light)">Forgotten's Touch:</strong> You can cast the spare the dying cantrip with a range of 30 feet.</li>
    <li><strong style="color:var(--gold-light)">Path Walker:</strong> You have advantage on death saving throws.</li>
    <li><strong style="color:var(--gold-light)">Sildae Sensitivity:</strong> You always know when magic has been cast in the past 24 hours within 60 feet (visible as faint light residue).</li>
    <li><strong style="color:var(--gold-light)">Unity of Fragments:</strong> Once per long rest, grant an ally within 30 feet the benefit of your next Shard spend as if they spent it themselves.</li>
  </ul>

  ${sectionHeader('Sildae Magic')}
  ${para('The Sildae is the magical realm underlying all of existence — a vast, luminous labyrinth through which the souls of the dead travel toward (or away from) the Forgotten. It is the source of all magic. Spellcasting functions as standard D&D 5e with the following flavor:')}
  ${table(
    ['Magic Type','Flavor'],
    [
      ['Arcane (Wizard/Sorcerer)','Sildae-channeling — direct tap of the Sildae through study or bloodline'],
      ['Divine (Cleric/Paladin)','Sildae-gifting — power received from the Forgotten through the Sildae, mediated by faith'],
      ['Primal (Druid/Ranger)','Sildae-listening — attunement to the Sildae as it expresses through the natural world'],
      ['Pact (Warlock)','Sildae-bargaining — agreements with entities that exist partially within the Sildae'],
    ]
  )}
  ${flavor('The Sildae Labyrinth is the afterlife of this setting. When a character dies, their soul enters the Labyrinth and must navigate it toward the Forgotten. The Khol Sadar teaches that accumulated wisdom and spiritual development shortens the path. Characters with high Shard counts who die may receive brief prophetic visions before resurrection magic severs the path — foreshadowing the DM can use.')}

  ${sectionHeader('Moonship Travel')}
  ${para('The primary mode of inter-moon travel is the Moonship — great sailing vessels enchanted with Sildae Drives that navigate the Aetherspace between moons.')}
  ${table(
    ['Vessel Class','Speed','Capacity','Cost (one-way)'],
    [
      ['Passenger Frigate','3d6 days','200 passengers','5 gp per person'],
      ['Trade Galleon','4d6 days','500 tons cargo','Freight rates apply'],
      ['Fast Clipper','1d6 days','20 passengers','50 gp per person'],
      ['Military Dreadnought','2d6 days','400 crew + cargo','Not for hire'],
      ['Sildae Teleport Platform','Instant','1 person + gear','500 gp per person'],
    ]
  )}
  ${para('During Moonship travel, roll d20 for random events: 1–3 Nothing happens. 4–7 Minor event (equipment problem, sailor gossip with a plot hook). 8–14 Interesting encounter (another ship, Aetherspace weather, distress signal). 15–18 Complication (piracy attempt, mechanical failure, rival faction). 19–20 Major event (discovery, Void-creature attack, emergency at destination).')}`;
}

function pageMoons() {
  const moons = [
    { name: 'Andaesil', subtitle: 'The Temple Moon', house: 'House Vaelkir', pop: 'High Density',
      desc: 'The spiritual capital of the Union. Andaesil\'s surface is dominated by the Grand Temple Complex — hundreds of interconnected holy structures spanning a landmass the size of a small continent. Clockwork calligraphy automata inscribe scripture endlessly onto the temple walls. The Union Senate convenes here in the Hall of All Fragments. The Sisterhood of Andaesillian Mistresses was expelled from this moon five thousand years ago.',
      hook: 'A set of ancient temple records has been sealed since the 10th Prophet\'s purge. The Sisterhood wants them. So does House Vaelkir. The truth inside may destabilize the faith.',
      location: 'The Sildae Observatory — where aetherspace above Kassis is continuously monitored for signs the Sphere is weakening.',
      tone: 'Political intrigue, religious authority, institutional memory' },
    { name: 'Baladon', subtitle: 'The Warrior Moon', house: 'House Shidomo',
      desc: 'A moon of dueling academies, classified tactical archives, and the midnight blade. House Shidomo\'s duelists are said to end wars before they begin — sometimes by arranging for the opposing general to fall off a balcony. Baladon trains the Union\'s officer class and houses its most classified military research.',
      hook: 'A Shidomo duelist challenges the party\'s most combat-capable member. Behind the challenge is a proxy war between two Holy Houses who cannot be seen fighting openly.',
      tone: 'Honor, shadow politics, martial perfection' },
    { name: 'Phelindor', subtitle: 'The Forest Moon', house: 'House Brannoch',
      desc: 'The canopy world. Almost entirely unbroken forest, settlements integrated into living trees by the Mho\'kai who built them. House Brannoch rules by binding outlaw clans and monster-hunters into feudal retinues. The wilderness is genuinely dangerous — creatures from the Kaigari Age sleep in the deep forest.',
      hook: 'Something ancient has woken in the deep forest. Three scouting parties from House Brannoch haven\'t returned.',
      tone: 'Wilderness survival, frontier justice, ecological horror' },
    { name: 'Meeru', subtitle: 'The Elemental Court', house: 'House Yezhura',
      desc: 'Elemental planes bleed into Meeru constantly. Volcanic plains adjoin frozen tundra adjoin living storms adjoin crystalline earth formations. House Yezhura\'s mystics claim to have a star-map from the First Prophet that explains Meeru\'s pattern. They are almost certainly lying about what it contains.',
      hook: 'House Yezhura has announced a new \'prophecy\' granting them authority over a neighboring moon. The evidence is in their star-map. Someone needs to see that map.',
      tone: 'Elemental wonder, mystical intrigue, unstable geography' },
    { name: 'New Certhas', subtitle: 'The Market Moon', house: 'House Ar\'Kessan',
      desc: 'Named for the lost capital of Kassis, an act of deliberate cultural preservation and barely-concealed economic dominance. The bankers and resource barons of Ar\'Kessan prop up half the Union\'s economy. They are respected, resented, and completely indispensable — and they know it.',
      hook: 'A financial instrument circulating through New Certhas markets is backed by a resource extracted from a location on the Sphere\'s surface that shouldn\'t be accessible.',
      tone: 'Commerce, desperation, economic power as coercion' },
    { name: 'Farstride', subtitle: 'The Port Moon', house: 'House Tsunari',
      desc: 'The fastest ships in the Union are built and berthed at Farstride. A labyrinth of shipyards, warehouses, shadow-accounting offices, and Gray Market operations they officially do not run. The Dholmer have built every important informal network on this moon.',
      hook: 'A Moonship has arrived from an origin port that doesn\'t exist in Union records. Its crew are acting strangely. Its cargo manifest is filed under a House that fell five hundred years ago.',
      tone: 'Noir, smuggling, maritime intrigue' },
    { name: 'Varthia', subtitle: 'The Healer Moon', house: 'House Qoraithe',
      desc: 'Officially a hub for healers, apothecaries, and spiritual medicine. Unofficially, House Qoraithe runs the Union\'s most sophisticated black market in alchemical substances — the miracle workers are revered by day and supplying stimulants by night.',
      hook: 'A new treatment for Aetherspace Sickness is revolutionary, the clinical trials are perfect, and the supplier of the core ingredient is a Dhormalae Confederacy front.',
      tone: 'Medical ethics, moral compromise, the cost of healing' },
    { name: 'Ozara', subtitle: 'The Tinkerer\'s Moon', house: 'House Drajhul',
      desc: 'Ozara never sleeps. The industrial output of House Drajhul\'s metalworks sustains half the Union\'s Moonship fleet and all of its clockwork military equipment. The moon runs on labor — and the labor is exhausted, unionizing, and beginning to listen to Voidist recruiters.',
      hook: 'A labor action at the main Drajhul foundry threatens to halt Moonship production. The Voidist organizers have a legitimate grievance. The party has been hired by Drajhul to resolve the situation.',
      tone: 'Labor politics, industrial scale, the revolution question' },
    { name: 'Norvarch', subtitle: 'The Scholar Moon', house: 'House Vel\'Sarune',
      desc: 'The Union\'s greatest library and its most sophisticated propaganda operation occupy the same buildings. Vel\'Sarune\'s romantic scholars and propagandists have been crafting the Union\'s historical narrative for two thousand years. Sealed wings of the archive haven\'t been opened since the 10th Prophet\'s reign.',
      hook: 'A junior Zhenfarron archivist has found a discrepancy in the official record of Nikalysa\'s final hours. The discrepancy suggests she did not choose to die — she was pushed.',
      tone: 'Academic mystery, historical conspiracy, the danger of knowledge' },
    { name: 'Darqueholme', subtitle: 'The Greywalker Moon', house: 'House Rinshado',
      desc: 'Named for the 3rd Prophet who founded the Shadows of Darqueholme intelligence network. This moon is the Union\'s intelligence hub — officially for inter-moon security, unofficially for knowing everyone\'s secrets. House Rinshado and the Greywalkers work at cross-purposes as often as they collaborate.',
      hook: 'A Greywalker safe house has been burned. The people inside were investigating the Holy Steward\'s private communications. The party finds the only survivor.',
      tone: 'Espionage, moral compromise, institutional surveillance' },
    { name: 'Freeholme', subtitle: 'The Refuge Moon', house: 'House Thorne-Izu',
      desc: 'The quasi-independent moon for outcasts, refugees, ideological dissenters, and the culturally homeless. Tradition and technology fight daily in its crowded cities. House Thorne-Izu is half ancient Kassis nobility and half immigrant industrialists, and they govern by constant internal contradiction.',
      hook: 'A community of non-Faithful refugees has petitioned Freeholme for sanctuary. The Union Senate\'s investigating delegation has different goals than its mandate.',
      tone: 'Refugee politics, cultural collision, the limits of sanctuary' },
    { name: 'New Mintox', subtitle: 'The Desert Moon', house: 'House Kelvath',
      desc: 'Ninety percent deadly wilderness. Simultaneously the Union\'s penal colony, its most dangerous ecosystem, and the Mintox people\'s cultural reclamation project. The beasts of New Mintox are unlike anything on other moons — evolved in isolation from creatures with no analog elsewhere.',
      hook: 'A prisoner transport crashed into the deep desert weeks ago. The prisoners have formed a survival community. Someone important is among them — three factions want them extracted for different reasons.',
      tone: 'Survival horror, desert exploration, the question of punishment' },
    { name: 'Mithnami', subtitle: 'The Farmers Moon', house: 'House Mi\'Dratha',
      desc: 'The breadbasket of the Union. Magic and agriculture have been intertwined for two thousand years under Mi\'Dratha\'s enchanter-stewardship. The Fung\'s mycelial networks run beneath every field. The floating sanctuaries above them house rituals viewed with suspicious reverence.',
      hook: 'The mycelial network beneath Mithnami\'s northern agricultural region has gone silent. The Fung communities connected to it have stopped communicating. No one is dead. They just... stopped.',
      tone: 'Agricultural magic, ecological mystery, the uncanny' },
    { name: 'Xyros', subtitle: 'The Dragon Lords\' Moon', house: 'House Orramune',
      desc: 'The bureaucracy moon. Ancient power dressed in paperwork. Where the Xixus hold court and the Union\'s legal archives are maintained. The oldest Xixus families maintain private collections of Xix Magocracy artifacts and will go to considerable lengths to keep them private.',
      hook: 'A legal case hinges on a pre-Exodus treaty in the restricted archive. Retrieving it legally will take years. Retrieving it otherwise will take the party into the deepest stacks of a moon that does not like unofficial visitors.',
      tone: 'Legal drama, ancient power, institutional gatekeeping' },
    { name: 'Zhenrhaglo', subtitle: 'The Miners Moon', house: 'House Zhaokorin',
      desc: 'Ritual fire and mineral extraction share Zhenrhaglo in uneasy partnership. House Zhaokorin claims guardianship of the "last flame of pre-Exodus divinity" — an ever-burning fire that has not been extinguished since before the Final War. The mines produce the Athgarium ore that powers Faithforged construction.',
      hook: 'The eternal flame has dimmed for the first time in recorded history. Zhaokorin is calling it a testing of the Faithful. The Shamzi engineer who maintains the flame\'s mechanisms knows exactly what it is — and it isn\'t divine.',
      tone: 'Religious spectacle vs. material reality, extraction economies, faith under pressure' },
    { name: 'Ordae', subtitle: 'The Moon of Lakes', house: 'House Verukael',
      desc: 'Fortress-islands, inland lake labyrinths, and pirate lords turned governors. House Verukael was pardoned for skill — their maritime expertise was too valuable to waste — and they govern with the charisma and creative legal interpretation their origins suggest. The Dhrae and Azrha Rho make Ordae fascinating and occasionally terrifying.',
      hook: 'A lake fortress belonging to a minor Verukael family has gone dark. The lake surrounding it has turned an unusual color. The Azrha Rho guardians haven\'t sent a distress signal. They\'ve sent nothing.',
      tone: 'Swamp gothic, nautical exploration, reformed pirates' },
    { name: 'The Platform', subtitle: 'Orbital Station (not a moon)',
      house: 'Union Military',
      desc: 'A massive constructed station in fixed orbit above the Sphere. Serves as magical observatory, last-resort military installation, and the most disquieting posting in the Union military. From here, observers can see Kassis through the Sphere — can see the undead and the Kaigari still moving on the surface, after two thousand years. The Platform\'s garrison has the lowest morale in the Union. Its researchers have the highest publication rate.',
      hook: 'Platform Observation Log #14,883 has been classified at the highest level. It\'s 200 words long. The researchers who wrote it requested immediate reassignment to the furthest moons. They have not spoken publicly about what they saw.',
      tone: 'Cosmic dread, institutional anxiety, the unknown' },
  ];

  return `
  ${para('Sixteen moons orbit the shimmering Sphere that was once Kassis, each settled by different populations, developed by different Houses, and shaped by different ecological realities. <strong style="color:var(--gold-light)">Tap any moon to expand its entry.</strong>')}
  ${moons.map(m => moonCard(m)).join('')}`;
}

let currentPage = 'welcome';
let menuOpen = false;

const pageBuilders = {
  welcome: pageWelcome,
  ancestries: pageAncestries,
  guilds: pageGuilds,
  mechanics: pageMechanics,
  moons: pageMoons,
  factions: pageFactions,
  monsters: pageMonsters,
  religion: pageReligion,
  appendix: pageAppendix,
};

function buildAllPages() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const div = document.createElement('div');
    div.id = 'page-' + ch.id;
    div.className = 'page' + (ch.id === 'welcome' ? ' active' : '');
    div.innerHTML = `<h1 class="page-title">${ch.title}</h1>` + pageBuilders[ch.id]() + buildPageNav(ch.id);
    main.appendChild(div);
  });
}

function buildPageNav(id) {
  const idx = CHAPTERS.findIndex(c => c.id === id);
  const prev = idx > 0 ? CHAPTERS[idx - 1] : null;
  const next = idx < CHAPTERS.length - 1 ? CHAPTERS[idx + 1] : null;
  return `<div class="page-nav">
    ${prev ? `<button class="page-nav-btn" onclick="navigate('${prev.id}')">← ${prev.short}</button>` : '<div></div>'}
    ${next ? `<button class="page-nav-btn" onclick="navigate('${next.id}')">${next.short} →</button>` : '<div></div>'}
  </div>`;
}

function buildNav() {
  const tabContainer = document.getElementById('nav-tabs');
  const dropContainer = document.getElementById('nav-dropdown');
  tabContainer.innerHTML = '';
  dropContainer.innerHTML = '';
  CHAPTERS.forEach(ch => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'nav-tab' + (ch.id === currentPage ? ' active' : '');
    tab.textContent = ch.short;
    tab.onclick = () => navigate(ch.id);
    tabContainer.appendChild(tab);
    // Dropdown
    const item = document.createElement('button');
    item.className = 'nav-dropdown-item' + (ch.id === currentPage ? ' active' : '');
    item.textContent = ch.title;
    item.onclick = () => navigate(ch.id);
    dropContainer.appendChild(item);
  });
}

function navigate(id) {
  document.querySelector('#page-' + currentPage)?.classList.remove('active');
  document.querySelector('#page-' + id)?.classList.add('active');
  currentPage = id;
  buildNav();
  menuOpen = false;
  document.getElementById('nav-dropdown').classList.remove('open');
  document.getElementById('menu-toggle').textContent = '☰ Chapters';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('nav-dropdown').classList.toggle('open', menuOpen);
  document.getElementById('menu-toggle').textContent = menuOpen ? '✕ Close' : '☰ Chapters';
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
  const btn = card.querySelector('.card-toggle');
  btn.setAttribute('aria-expanded', card.classList.contains('open'));
}

// ============================================================
// INIT
// ============================================================
buildAllPages();
buildNav();
</script>
</body>
</html>
